spring:
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8080}

app:
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  llm:
    model-vision: ${LLM_MODEL_VISION:anthropic/claude-sonnet-4.6}
    model-decision: ${LLM_MODEL_DECISION:anthropic/claude-sonnet-4.6}
  public-url: ${APP_PUBLIC_URL:http://localhost:4200}
  title: ${APP_TITLE:NBP Hardware Service Decision Copilot}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  session:
    ttl-minutes: ${SESSION_TTL_MINUTES:60}
  image:
    max-bytes: ${IMAGE_MAX_BYTES:5242880}
